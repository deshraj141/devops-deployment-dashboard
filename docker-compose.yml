services:
  mongo:
    image: mongo:7
    container_name: devops_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  server:
    build:
      context: ./server
    container_name: devops_server
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      - PORT=5000
      - MONGO_URI=${MONGO_URI:-mongodb://mongo:27017/devops_dashboard}
      - FRONTEND_URL=http://localhost:3000,http://localhost:5173
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  client:
    build:
      context: ./client
    container_name: devops_client
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "3000:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  mongo_data:
